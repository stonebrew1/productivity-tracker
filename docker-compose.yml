services:
  mailpit:
    image: axllent/mailpit:v1.27
    ports:
      - "1025:1025"
      - "8025:8025"

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: productivity
      POSTGRES_USER: productivity
      POSTGRES_PASSWORD: productivity
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://productivity:productivity@db:5432/productivity
      SECRET_KEY: local-development-secret-change-in-production
      JWT_ISSUER: momentum-api
      JWT_AUDIENCE: momentum-web
      REFRESH_COOKIE_SECURE: "false"
      FRONTEND_ORIGIN: http://localhost:5173
      EMAIL_DELIVERY_MODE: ${EMAIL_DELIVERY_MODE:-smtp}
      EMAIL_VERIFICATION_EXPIRE_HOURS: "24"
      EMAIL_FROM: ${EMAIL_FROM:-Momentum <no-reply@momentum.local>}
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-false}
      SMTP_USE_SSL: ${SMTP_USE_SSL:-false}
    ports:
      - "8000:8000"
    depends_on:
      - db
      - mailpit

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
